# ══════════════════════════════════════════════════════════════
# PeakPack — Coolify Docker Compose
#
# ⚠  COOLIFY RULES (read before editing):
#   1. NO `networks:` block — Coolify auto-manages networking
#   2. NO nginx — Coolify uses Traefik as reverse proxy
#   3. NO postgres — hosted on Supabase (managed)
#   4. NO MinIO — using Supabase Storage instead
#   5. Services talk to each other by service name (e.g. api:4000)
#   6. Domains are assigned in the Coolify UI per-service
#
# Routing (separate subdomains):
#   yourdomain.com        → frontend:3000
#   api.yourdomain.com    → api:4000  (also handles Socket.IO)
# ══════════════════════════════════════════════════════════════

services:

  # ── Next.js Frontend ─────────────────────────────────────────
  # Coolify UI: assign domain → yourdomain.com  (port 3000)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Build-time vars baked into the Next.js bundle
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL}
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_SOCKET_URL=${NEXT_PUBLIC_SOCKET_URL}
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ── Express API ───────────────────────────────────────────────
  # Coolify UI: assign domain → api.yourdomain.com  (port 4000)
  # Coolify UI: Pre-deploy command → npx prisma migrate deploy
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - EMAIL_FROM=${EMAIL_FROM}
      # CORS: must match your frontend domain exactly
      - SOCKET_CORS_ORIGIN=${SOCKET_CORS_ORIGIN}
      - APP_URL=${APP_URL}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ── BullMQ Worker ─────────────────────────────────────────────
  # No domain — runs in background processing email/notification jobs
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: node dist/worker.js
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - EMAIL_FROM=${EMAIL_FROM}
    restart: unless-stopped
