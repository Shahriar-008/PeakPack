name: CI / Deploy to Coolify

on:
  push:
    branches: [main]

jobs:
  # ── Type-check & lint ──────────────────────────────────────
  typecheck:
    name: Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend deps
        run: npm ci
        working-directory: backend

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: backend

      - name: Type-check backend
        run: npm run typecheck
        working-directory: backend

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Type-check frontend
        run: npx tsc --noEmit
        working-directory: frontend

  # ── Deploy via Coolify webhook ─────────────────────────────
  deploy:
    name: Trigger Coolify Deploy
    needs: typecheck
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy Docker Compose stack
        run: |
          curl --silent --fail --show-error \
            --request GET "${{ secrets.COOLIFY_DEPLOY_WEBHOOK }}" \
            --header "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}"
        # COOLIFY_DEPLOY_WEBHOOK  — from Coolify UI: Resource → Webhooks → Deploy
        # COOLIFY_API_TOKEN       — from Coolify UI: Profile → API Tokens

