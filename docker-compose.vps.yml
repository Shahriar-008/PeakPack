# ══════════════════════════════════════════════════════════════
# PeakPack — VPS Docker Compose (Self-Hosted with Supabase)
#
# This file orchestrates PeakPack on a VPS:
#   - nginx: reverse proxy (80/443)
#   - frontend: Next.js on 3000 (internal)
#   - api: Express + Socket.IO on 4000 (internal)
#   - worker: BullMQ background jobs
#   - redis: in-memory cache and job queue
#
# External services (managed):
#   - PostgreSQL via Supabase (DATABASE_URL)
#   - File storage via Supabase Storage
#
# ══════════════════════════════════════════════════════════════

version: "3.9"

networks:
  peakpack:
    driver: bridge

volumes:
  redis_data:

services:

  # ── Reverse Proxy (nginx) ─────────────────────────────────────
  # Terminates SSL and routes requests to frontend/api
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - frontend
      - api
    networks:
      - peakpack
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend (Next.js) ────────────────────────────────────────
  # Served via nginx at yourdomain.com
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL}
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_SOCKET_URL=${NEXT_PUBLIC_SOCKET_URL}
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    expose:
      - "3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - peakpack
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── API (Express + Socket.IO) ─────────────────────────────────
  # Served via nginx at api.yourdomain.com
  # Handles HTTP routes and WebSocket connections
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - EMAIL_FROM=${EMAIL_FROM}
      - SOCKET_CORS_ORIGIN=${SOCKET_CORS_ORIGIN}
      - APP_URL=${APP_URL}
    expose:
      - "4000"
    depends_on:
      redis:
        condition: service_started
    networks:
      - peakpack
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ── Worker (BullMQ) ───────────────────────────────────────────
  # Background job processor for email, notifications, recaps
  # Uses same image as API but runs worker.js
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: node dist/worker.js
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - EMAIL_FROM=${EMAIL_FROM}
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - peakpack
    restart: unless-stopped

  # ── Redis (Cache + Job Queue) ─────────────────────────────────
  # In-memory data store for session cache and BullMQ job queue
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    networks:
      - peakpack
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
