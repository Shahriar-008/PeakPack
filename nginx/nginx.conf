events {
  worker_connections 1024;
}

http {
  include       mime.types;
  default_type  application/octet-stream;

  # ── Logging ───────────────────────────────────────────────────
  access_log /var/log/nginx/access.log;
  error_log  /var/log/nginx/error.log warn;

  # ── Performance ───────────────────────────────────────────────
  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 65;

  # ── Gzip compression ─────────────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/xml+rss
    application/atom+xml
    image/svg+xml;

  # ── Rate limiting zones ───────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api_limit:10m  rate=100r/m;
  limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

  # ── Client body size (for file uploads up to 10MB) ───────────
  client_max_body_size 10M;

  # ── Upstream services ─────────────────────────────────────────
  upstream frontend { server frontend:3000; }
  upstream api      { server api:4000; }

  # ── HTTP → HTTPS redirect ─────────────────────────────────────
  server {
    listen 80;
    server_name yourdomain.com;

    # Let's Encrypt ACME challenge (HTTP-01)
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ── Main HTTPS server ─────────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security headers ────────────────────────────────────────
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ── Auth routes (strict rate limit) ─────────────────────────
    location /api/auth/ {
      limit_req zone=auth_limit burst=5 nodelay;
      proxy_pass http://api;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── API routes ───────────────────────────────────────────────
    location /api/ {
      limit_req zone=api_limit burst=20 nodelay;
      proxy_pass http://api;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 30s;
    }

    # ── Socket.IO (WebSocket upgrade required) ────────────────
    location /socket.io/ {
      proxy_pass http://api;
      proxy_http_version 1.1;
      proxy_set_header Upgrade    $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host       $host;
      proxy_set_header X-Real-IP  $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_cache_bypass $http_upgrade;
      proxy_read_timeout 86400s;  # WebSocket long-lived connection
    }

    # ── Next.js static assets (long-term cache) ──────────────────
    location /_next/static/ {
      proxy_pass http://frontend;
      proxy_set_header Host $host;
      expires 1y;
      add_header Cache-Control "public, immutable";
    }

    # ── Frontend (all other routes → Next.js) ────────────────────
    location / {
      proxy_pass http://frontend;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade           $http_upgrade;
      proxy_set_header Connection        "upgrade";
    }
  }
}
